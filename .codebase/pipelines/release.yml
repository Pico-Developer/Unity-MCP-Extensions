name: release-to-github
trigger: manual
inputs:
  version:
    type: string
    description: '目标版本 v{a.b.c} 或 a.b.c,例如 0.0.3 / v0.0.3'
    required: true
  skip_version:
    type: boolean
    description: '跳过"新版本必须更大"校验(格式仍会校验)'
    required: false
    default: false
  tag:
    type: string
    description: 'tag 名,例如 release/v0.0.3;不填则不打 tag'
    required: false
    default: ''
  from_branch:
    type: string
    description: 'Codebase 源分支(单个),为空默认 main'
    required: false
    default: main
  to_branch:
    type: string
    description: 'GitHub 目标分支,可填多个用空格分隔,为空默认 main'
    required: false
    default: main
jobs:
  release:
    name: Sync to GitHub main
    image: hub.byted.org/codebase/ci_debian_bullseye
    envs:
      VERSION: ${{ Event.Inputs.version }}
      SKIP_VERSION: ${{ Event.Inputs.skip_version }}
      TAG: ${{ Event.Inputs.tag }}
      FROM_BRANCH: ${{ Event.Inputs.from_branch }}
      TO_BRANCH: ${{ Event.Inputs.to_branch }}
      GITHUB_TOKEN: ${{ GITHUB_TOKEN }}
    steps:
      - name: checkout
        uses: actions/checkout
      - name: prepare-and-push
        commands:
          - apt-get update && apt-get install -y python3 git
          - git config user.name "pico-ci-bot"
          - git config user.email "pico-ci-bot@bytedance.com"
          # 需求 0:从 from_branch(默认 main)切独立分支
          - git fetch origin "${FROM_BRANCH}"
          - git checkout -B "${FROM_BRANCH}" "origin/${FROM_BRANCH}"
          - git checkout -b "release/prep-$(date +%s)"
          # 需求 1+2+校验:补版权头 + 改版本 + 版本校验
          - |
            if [ "${SKIP_VERSION}" = "true" ]; then
              python3 .codebase/scripts/prepare_release.py "${VERSION}" --skip-version
            else
              python3 .codebase/scripts/prepare_release.py "${VERSION}"
            fi
          - export REL_VERSION="$(cat .release_version)"
          - rm -f .release_version
          - git add -A
          - 'git commit -m "chore(release): headers & bump to ${REL_VERSION}" || echo "nothing to commit"'
          # 需求 3:推送到 to_branch(默认 main,可多个用空格分隔)
          - git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/Pico-Developer/Unity-MCP-Extensions.git"
          - |
            for b in ${TO_BRANCH}; do
              echo "pushing to github ${b}"
              git push github "HEAD:${b}"
            done
          # 需求 4:传了 tag 则打该名 tag 并推送,不传则跳过
          - |
            if [ -n "${TAG}" ]; then
              echo "pushing tag ${TAG}"
              git tag "${TAG}"
              git push github "${TAG}"
            else
              echo "no tag input, skip tagging"
            fi
